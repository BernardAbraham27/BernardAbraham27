<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Deep Cyber Space Background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#020c1b" />
    </radialGradient>
    
    <!-- Moving Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0, 242, 254, 0.05)" stroke-width="1" />
    </pattern>

    <!-- Star/Laser Glow Filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" />
  
  <!-- Subtle animated grid -->
  <rect width="100%" height="100%" fill="url(#grid)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- Ambient background energy orbs -->
  <circle cx="20%" cy="30%" r="200" fill="#00f2fe" opacity="0.04">
    <animate attributeName="r" values="200;250;200" dur="10s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="10s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="85%" cy="75%" r="300" fill="#4facfe" opacity="0.04">
    <animate attributeName="r" values="300;380;300" dur="12s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.02;0.06;0.02" dur="12s" repeatCount="indefinite" />
  </circle>

  <!-- Flowing cyber data lines -->
  <g opacity="0.6" stroke="#00f2fe" stroke-width="1.5" filter="url(#starGlow)">
    <line x1="0" y1="20%" x2="100%" y2="20%" stroke-dasharray="20 40">
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite" />
    </line>
    
    <line x1="0" y1="80%" x2="100%" y2="80%" stroke-dasharray="15 35">
      <animate attributeName="stroke-dashoffset" from="0" to="600" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="8s" repeatCount="indefinite" />
    </line>
    
    <line x1="15%" y1="0" x2="15%" y2="100%" stroke-dasharray="10 20">
      <animate attributeName="stroke-dashoffset" from="0" to="600" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite" />
    </line>
    
    <line x1="85%" y1="0" x2="85%" y2="100%" stroke-dasharray="30 50">
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="7s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
