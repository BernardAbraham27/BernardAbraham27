<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" fill="#0d1117" rx="20"/>
  <!-- Abstract Tech/AI Hexagon -->
  <path d="M 30 25 L 70 25 L 85 50 L 70 75 L 30 75 L 15 50 Z" fill="none" stroke="url(#logoGrad)" stroke-width="4" filter="url(#logoGlow)" />
  <!-- Monogram -->
  <text x="50" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#logoGlow)">BA</text>
  <!-- Decorative Dot -->
  <circle cx="50" cy="72" r="3" fill="#00f2fe" filter="url(#logoGlow)"/>
</svg>
